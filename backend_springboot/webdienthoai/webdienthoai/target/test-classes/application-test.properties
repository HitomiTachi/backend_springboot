spring.datasource.url=jdbc:h2:mem:webdienthoai_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# keep tests independent from local secrets
app.jwt.secret=test-jwt-secret-key-at-least-32-bytes-long
app.gemini.api-key=test-key
app.storage.type=local

app.urls.api-public-base=http://localhost:8080
app.urls.frontend-base=http://localhost:3000
app.vnpay.enabled=false
app.vnpay.tmn-code=
app.vnpay.hash-secret=

# Không gọi SMTP trong test
app.mail.enabled=false
app.mail.welcome-enabled=false
app.mail.verification-enabled=false
app.mail.order-notifications-enabled=false
