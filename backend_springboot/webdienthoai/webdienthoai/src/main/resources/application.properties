spring.application.name=webdienthoai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Default datasource settings via environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/webbandienthoai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}

# Server
server.port=${SERVER_PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.auth.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
app.auth.lock-minutes=${AUTH_LOCK_MINUTES:15}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

# File Upload — local: lưu disk; r2: presigned PUT Cloudflare R2 (không lưu file trên app server)
# STORAGE_TYPE=r2 cần: S3_ENDPOINT (chỉ host, ví dụ https://<account_id>.r2.cloudflarestorage.com), S3_BUCKET, AWS keys, PUBLIC_ASSET_BASE_URL (pub-*.r2.dev)
app.storage.type=${STORAGE_TYPE:local}
app.r2.endpoint=${S3_ENDPOINT:}
app.r2.bucket=${S3_BUCKET:}
app.r2.access-key-id=${AWS_ACCESS_KEY_ID:}
app.r2.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
app.r2.public-base-url=${PUBLIC_ASSET_BASE_URL:}
app.r2.key-prefix=${R2_KEY_PREFIX:}
app.upload.dir=${UPLOAD_DIR:${user.dir}/FE_Spring_boot/public/uploads}
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY:}

# Public URL của API (VNPay return URL = {apiPublicBase}/api/payments/vnpay/return)
app.urls.api-public-base=${APP_PUBLIC_BASE_URL:http://localhost:8080}
# Frontend — redirect sau thanh toán VNPay
app.urls.frontend-base=${FRONTEND_BASE_URL:http://localhost:3000}

# VNPay — bật khi có TMN + Hash Secret (sandbox hoặc production)
app.vnpay.enabled=${VNPAY_ENABLED:false}
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
