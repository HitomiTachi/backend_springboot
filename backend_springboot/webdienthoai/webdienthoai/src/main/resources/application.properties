spring.application.name=webdienthoai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Default datasource settings via environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/webbandienthoai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}

# Server
server.port=${SERVER_PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.auth.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
app.auth.lock-minutes=${AUTH_LOCK_MINUTES:15}
# Chỉ bật trên dev/Postman: trả resetToken trong JSON forgot-password (prod để false)
app.auth.expose-reset-token=${EXPOSE_RESET_TOKEN:false}

# Gmail SMTP — MAIL_USERNAME + MAIL_APP_PASSWORD (App Password, không dùng mật khẩu đăng nhập thường)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Gửi mail: MAIL_ENABLED=false để tắt gọi SMTP (token vẫn lưu DB khi user tồn tại)
app.mail.enabled=${MAIL_ENABLED:true}
# Để trống thì From = spring.mail.username
app.mail.from=${MAIL_FROM:}
app.mail.welcome-enabled=${MAIL_WELCOME_ENABLED:true}
app.mail.verification-enabled=${MAIL_VERIFICATION_ENABLED:true}
app.mail.order-notifications-enabled=${MAIL_ORDER_NOTIFICATIONS_ENABLED:true}
# Danh sách admin nhận mail đơn mới (phân tách dấu phẩy), ví dụ: a@x.com,b@x.com
app.mail.admin-notify-emails=${MAIL_ADMIN_NOTIFY_EMAILS:}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

# File Upload — local: lưu disk; r2: presigned PUT Cloudflare R2 (không lưu file trên app server)
# STORAGE_TYPE=r2 cần: S3_ENDPOINT (chỉ host, ví dụ https://<account_id>.r2.cloudflarestorage.com), S3_BUCKET, AWS keys, PUBLIC_ASSET_BASE_URL (pub-*.r2.dev)
app.storage.type=${STORAGE_TYPE:local}
app.r2.endpoint=${S3_ENDPOINT:}
app.r2.bucket=${S3_BUCKET:}
app.r2.access-key-id=${AWS_ACCESS_KEY_ID:}
app.r2.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
app.r2.public-base-url=${PUBLIC_ASSET_BASE_URL:}
app.r2.key-prefix=${R2_KEY_PREFIX:}
app.upload.dir=${UPLOAD_DIR:${user.dir}/FE_Spring_boot/public/uploads}
# Upload ảnh + file Excel import (có thể tăng qua biến môi trường)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:20MB}

# Gemini AI — chỉ qua biến môi trường GEMINI_API_KEY (không đặt default key trong file)
app.gemini.api-key=${GEMINI_API_KEY:}

# Public URL của API (VNPay return URL = {apiPublicBase}/api/payments/vnpay/return)
app.urls.api-public-base=${APP_PUBLIC_BASE_URL:http://localhost:8080}
# Frontend — redirect sau thanh toán VNPay
app.urls.frontend-base=${FRONTEND_BASE_URL:http://localhost:3000}

# VNPay — bật khi có TMN + Hash Secret (sandbox hoặc production)
app.vnpay.enabled=${VNPAY_ENABLED:false}
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}

# Google OAuth (signin with Google)
app.oauth.google.enabled=${GOOGLE_OAUTH_ENABLED:false}
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
app.oauth.google.scope=${GOOGLE_OAUTH_SCOPE:openid email profile}
app.oauth.google.state-ttl-seconds=${GOOGLE_OAUTH_STATE_TTL_SECONDS:300}
app.oauth.google.frontend-success-url=${GOOGLE_FRONTEND_SUCCESS_URL:http://localhost:3000/#/oauth/google/callback}
app.oauth.google.frontend-failure-url=${GOOGLE_FRONTEND_FAILURE_URL:http://localhost:3000/login}
app.oauth.google.allowed-redirect-uris=${GOOGLE_ALLOWED_REDIRECT_URIS:http://localhost:3000/#/oauth/google/callback,http://127.0.0.1:3000/#/oauth/google/callback}
