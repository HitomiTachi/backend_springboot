spring.application.name=webdienthoai
# XAMPP MySQL (mặc định: root, không mật khẩu, port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/webbandienthoai
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Server Configuration
server.port=8080

# JWT (production: set via env APP_JWT_SECRET)
app.jwt.secret=techhome-secret-key-change-in-production-min-256-bits
app.jwt.expiration-ms=86400000

# CORS: thêm origin production (cách nhau bằng dấu phẩy), ví dụ:
# app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,https://techhome.com
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001

# Phone specs API (tùy chọn – xem PHONE_SPECS_APIS.md)
# app.phone-specs.api-url=https://mobile-phone-database-api.p.rapidapi.com
# app.phone-specs.api-key-header=X-RapidAPI-Key
# app.phone-specs.api-key=your-rapidapi-key
# app.phone-specs.search-path=/search
