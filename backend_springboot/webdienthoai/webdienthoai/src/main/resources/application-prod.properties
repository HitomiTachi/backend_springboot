spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

# Production: bắt buộc object storage (Cloudflare R2). Không lưu upload trên disk server.
# Giá trị cố định — không dùng STORAGE_TYPE=local trên backend production.
# Bắt buộc env: S3_ENDPOINT, S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, PUBLIC_ASSET_BASE_URL
app.storage.type=r2
