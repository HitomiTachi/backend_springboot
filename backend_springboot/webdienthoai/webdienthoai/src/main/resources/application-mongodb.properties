# MongoDB local + Compass (xem MONGODB_COMPASS.md). Không dùng Atlas.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/techhome}
spring.data.mongodb.database=techhome

# Tắt MySQL/JPA khi chạy sync MongoDB
spring.autoconfigure.exclude=\
  org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
spring.jpa.hibernate.ddl-auto=none
