spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=false

# Dev local: không cần gõ $env:JWT_SECRET / $env:DB_PASSWORD mỗi lần chạy.
# Nếu đã set biến môi trường JWT_SECRET thì vẫn ưu tiên env.
# Profile prod không load file này — vẫn bắt buộc JWT_SECRET thật qua env.
app.jwt.secret=${JWT_SECRET:dev-only-local-secret-change-in-production-min-32-chars}
spring.datasource.password=${DB_PASSWORD:}

# VNPay sandbox (TEST) — chỉ profile dev. Nếu push Git công khai, nên xóa block này và dùng biến môi trường VNPAY_*.
# Return URL phải khai báo trên Merchant Admin: http://localhost:8080/api/payments/vnpay/return (hoặc APP_PUBLIC_BASE_URL tương ứng).
# IPN server-to-server: app hiện chỉ xử lý return URL; IPN là bước mở rộng sau.
app.vnpay.enabled=true
app.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.vnpay.tmn-code=XDX8NM1P
