spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.enabled=false

# Dev local: không cần gõ $env:JWT_SECRET / $env:DB_PASSWORD mỗi lần chạy.
# Nếu đã set biến môi trường JWT_SECRET thì vẫn ưu tiên env.
# Profile prod không load file này — vẫn bắt buộc JWT_SECRET thật qua env.
app.jwt.secret=${JWT_SECRET:dev-only-local-secret-change-in-production-min-32-chars}
spring.datasource.password=${DB_PASSWORD:}

# VNPay sandbox — chỉ bật khi set VNPAY_ENABLED=true và VNPAY_TMN_CODE / VNPAY_HASH_SECRET (không hardcode trong repo).
# Return URL khai báo trên Merchant Admin: {APP_PUBLIC_BASE_URL}/api/payments/vnpay/return
app.vnpay.enabled=${VNPAY_ENABLED:false}
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
